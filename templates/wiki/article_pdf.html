<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        body {
            font-family: "DejaVu Sans", sans-serif;
            font-size: 12pt;
            line-height: 1.5;
            color: #1d1d1f;
        }
        .header {
            border-bottom: 1px solid #e5e5e7;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .title {
            font-size: 24pt;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .meta {
            color: #86868b;
            font-size: 10pt;
        }
        .content {
            text-align: justify;
        }
        .footer {
            margin-top: 50px;
            font-size: 9pt;
            color: #86868b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{ article.title }}</div>
        <div class="meta">
            Tác giả: {{ article.author.username }} | 
            Danh mục: {{ article.category.name }} | 
            Ngày: {{ article.created_at|date:"d/m/Y" }}
        </div>
    </div>
    
    <div class="content">
        {{ article.content|safe }}
    </div>

    <div class="footer">
        Được xuất từ CP Wiki vào ngày {% now "d/m/Y" %}
    </div>
</body>
</html>
