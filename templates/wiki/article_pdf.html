{% load martortags %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @page {
            size: a4 portrait;
            margin: 2cm;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            color: #111;
            font-size: 24pt;
            margin-bottom: 10pt;
        }
        .meta {
            color: #666;
            font-size: 10pt;
            margin-bottom: 20pt;
            border-bottom: 1px solid #eee;
            padding-bottom: 10pt;
        }
        .content {
            font-size: 11pt;
        }
        pre {
            background: #f4f4f4;
            padding: 10pt;
            border-radius: 5pt;
            font-family: monospace;
        }
        code {
            background: #f4f4f4;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>{{ article.title }}</h1>
    <div class="meta">
        Tác giả: {{ article.author.username }} | 
        Danh mục: {{ article.category.name }} | 
        Ngày: {{ article.created_at|date:"d/m/Y" }}
    </div>
    <div class="content">
        {{ article.content|safe_markdown }}
    </div>
</body>
</html>
